pekko {
  loglevel = "INFO"

  actor {
    provider = cluster

    serialization-bindings {
      "com.tok.pekko.global.common.CborSerializable" = jackson-cbor
    }
  }

  remote.artery {
    canonical {
      hostname = "127.0.0.1"
      port = 0
    }
  }

  cluster {
    seed-nodes = []

    downing-provider-class = "org.apache.pekko.cluster.sbr.SplitBrainResolverProvider"
    split-brain-resolver {
      active-strategy = keep-majority
      stable-after = 3s
    }
  }
}
