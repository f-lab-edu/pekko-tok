app:
  timezone: Asia/Seoul
  websocket:
    endpoint: /ws/chat
    handler-order: -2147483648
    cors:
      allow-credentials: true
      allowed-origin-patterns:
        - "http://localhost:*"
        - "http://127.0.0.1:*"
        - "ws://localhost:*"
        - "ws://127.0.0.1:*"
      allowed-methods:
        - GET
        - POST
        - PUT
        - DELETE
        - OPTIONS
      allowed-headers:
        - "*"
      max-age: 3600
